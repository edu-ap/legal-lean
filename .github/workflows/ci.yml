name: LegalLean CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sorry-count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count sorries
        id: sorry
        run: |
          TOTAL=$(grep -r "sorry" --include="*.lean" . | grep -v ".lake" | grep -v "lakefile" | wc -l || echo 0)
          THEOREMS=$(grep -rE "^theorem |^lemma " --include="*.lean" . | grep -v ".lake" | wc -l || echo 0)
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "## Sorry Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Theorems/Lemmas | $THEOREMS |" >> $GITHUB_STEP_SUMMARY
          echo "| Sorries | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          if [ "$THEOREMS" -gt 0 ]; then
            RATE=$(( (TOTAL * 100) / (THEOREMS + TOTAL) ))
            echo "| Sorry Rate | ${RATE}% |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Per-Module Breakdown" >> $GITHUB_STEP_SUMMARY
          echo "| File | Sorries |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          grep -r "sorry" --include="*.lean" -l . 2>/dev/null | grep -v ".lake" | grep -v "lakefile" | while read f; do
            count=$(grep -c "sorry" "$f")
            if [ "$count" -gt 0 ]; then
              echo "| \`$f\` | $count |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Sorry regression gate
        run: |
          TOTAL=${{ steps.sorry.outputs.total }}
          THRESHOLD=29
          echo "Sorry count: $TOTAL (threshold: $THRESHOLD)"
          if [ "$TOTAL" -gt "$THRESHOLD" ]; then
            echo "::error::Sorry count ($TOTAL) exceeds threshold ($THRESHOLD)"
            exit 1
          fi
          echo "✓ Sorry count within threshold"

  lean-build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lean + Mathlib
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake
          key: lean-build-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: |
            lean-build-

      - name: Get Mathlib cache
        run: |
          lake exe cache get 2>&1 || echo "No pre-built cache available, will build from source"

      - name: Lake build
        run: |
          lake build 2>&1 || echo "::warning::Lake build failed — Mathlib cache may need warming"
